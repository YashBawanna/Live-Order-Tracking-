<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OrderStream — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --border-hi: #2e2e4e;
    --text:      #e2e2f0;
    --muted:     #5a5a7a;
    --accent:    #7c6af7;
    --accent-lo: rgba(124,106,247,.12);
    --green:     #22d3a0;
    --green-lo:  rgba(34,211,160,.12);
    --amber:     #f59e0b;
    --amber-lo:  rgba(245,158,11,.12);
    --red:       #f43f5e;
    --red-lo:    rgba(244,63,94,.12);
    --blue:      #38bdf8;
    --blue-lo:   rgba(56,189,248,.12);
    --mono:      'Space Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --radius:    10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    letter-spacing: .05em;
    color: var(--accent);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.8); }
  }
  .header-meta {
    display: flex; align-items: center; gap: 20px;
  }
  .conn-badge {
    font-family: var(--mono);
    font-size: .7rem;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    transition: all .3s;
  }
  .conn-badge.live {
    color: var(--green);
    border-color: var(--green);
    background: var(--green-lo);
  }
  .conn-badge.error {
    color: var(--red);
    border-color: var(--red);
    background: var(--red-lo);
  }

  /* ── LAYOUT ──────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    flex: 1;
    min-height: 0;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); }
  }

  /* ── ORDERS PANEL ────────────────────────────────── */
  .panel {
    padding: 28px 32px;
    overflow-y: auto;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* ── CONTROLS ────────────────────────────────────── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .controls h3 {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }
  .field label {
    display: block;
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-hi);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 7px;
    font-family: var(--sans);
    font-size: .88rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  .btn {
    padding: 9px 18px;
    border-radius: 7px;
    border: none;
    font-family: var(--mono);
    font-size: .78rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: .85; transform: translateY(-1px); }
  .btn-sm {
    padding: 5px 10px;
    font-size: .68rem;
    border-radius: 5px;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border-hi);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--red-lo); color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover { background: var(--red); color: #fff; }

  /* ── ORDER TABLE ─────────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 12px 16px;
    font-size: .85rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr { transition: background .15s; }
  tr:hover td { background: rgba(255,255,255,.02); }

  tr.flash-new td  { animation: flashNew  1.2s ease-out; }
  tr.flash-upd td  { animation: flashUpd  1.2s ease-out; }
  tr.flash-del td  { animation: flashDel  .8s ease-out forwards; }

  @keyframes flashNew  { 0%{background:var(--green-lo)} 100%{background:transparent} }
  @keyframes flashUpd  { 0%{background:var(--amber-lo)} 100%{background:transparent} }
  @keyframes flashDel  { 0%{background:var(--red-lo);opacity:1} 100%{background:transparent;opacity:0} }

  .id-cell { font-family: var(--mono); font-size: .75rem; color: var(--muted); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-family: var(--mono);
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .status-badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .s-pending   { color: var(--amber); background: var(--amber-lo); }
  .s-shipped   { color: var(--blue);  background: var(--blue-lo);  }
  .s-delivered { color: var(--green); background: var(--green-lo); }
  .s-cancelled { color: var(--red);   background: var(--red-lo);   }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── SIDEBAR / ACTIVITY FEED ─────────────────────── */
  .sidebar {
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header h2 {
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .clear-btn {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
  }
  .clear-btn:hover { color: var(--red); }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .feed-empty {
    color: var(--muted);
    font-family: var(--mono);
    font-size: .72rem;
    text-align: center;
    margin-top: 40px;
    line-height: 1.8;
  }

  .event-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    animation: slideIn .3s ease-out;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:none } }

  .event-card.ev-INSERT { border-left: 3px solid var(--green); }
  .event-card.ev-UPDATE { border-left: 3px solid var(--amber); }
  .event-card.ev-DELETE { border-left: 3px solid var(--red);   }

  .event-op {
    font-family: var(--mono);
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .ev-INSERT .event-op { color: var(--green); }
  .ev-UPDATE .event-op { color: var(--amber); }
  .ev-DELETE .event-op { color: var(--red);   }

  .event-name  { font-size: .82rem; font-weight: 600; margin-bottom: 2px; }
  .event-prod  { font-size: .75rem; color: var(--muted); }
  .event-time  { font-family: var(--mono); font-size: .62rem; color: var(--muted); margin-top: 6px; }

  /* ── TOAST ───────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: .82rem;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transform: translateY(20px); opacity: 0;
    transition: all .25s;
    pointer-events: none;
    z-index: 999;
    max-width: 280px;
  }
  #toast.show { transform: none; opacity: 1; }

  /* ── LOADING ─────────────────────────────────────── */
  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; height: 14px; }
  @keyframes shimmer { to { background-position: -200% 0 } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot" id="liveDot"></div>
    OrderStream
  </div>
  <div class="header-meta">
    <span class="conn-badge" id="connBadge">CONNECTING…</span>
  </div>
</header>

<main>
  <!-- ── LEFT: orders table ── -->
  <div class="panel">
    <p class="panel-title">Live Orders</p>

    <!-- Add order form -->
    <div class="controls">
      <h3>New Order</h3>
      <div class="form-row">
        <div class="field">
          <label>Customer Name</label>
          <input id="inCustomer" type="text" placeholder="e.g. Jane Doe" />
        </div>
        <div class="field">
          <label>Product Name</label>
          <input id="inProduct" type="text" placeholder="e.g. Gaming Mouse" />
        </div>
        <button class="btn btn-primary" onclick="addOrder()">+ Add</button>
      </div>
    </div>

    <!-- Orders table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Status</th>
            <th>Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="6"><div class="skeleton" style="margin:8px 0;width:80%"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── RIGHT: live event feed ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📡 Change Feed</h2>
      <button class="clear-btn" onclick="clearFeed()">clear</button>
    </div>
    <div id="feed">
      <div class="feed-empty">No events yet.<br/>Waiting for DB changes…</div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const API = 'http://localhost:8000';

// ── Fetch & render all orders ────────────────────────
async function loadOrders() {
  try {
    const res  = await fetch(`${API}/orders`);
    const data = await res.json();
    renderOrders(data);
  } catch (e) {
    console.error('loadOrders:', e);
  }
}

function renderOrders(orders) {
  const tbody = document.getElementById('ordersBody');
  if (!orders.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);font-size:.8rem;padding:24px">No orders yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = orders.map(o => rowHTML(o)).join('');
}

function rowHTML(o) {
  const statusClass = `s-${o.status}`;
  const ts = o.updated_at ? new Date(o.updated_at).toLocaleString() : '—';
  return `<tr id="row-${o.id}">
    <td class="id-cell">${o.id}</td>
    <td>${esc(o.customer_name)}</td>
    <td>${esc(o.product_name)}</td>
    <td><span class="status-badge ${statusClass}">${o.status}</span></td>
    <td style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">${ts}</td>
    <td>
      <div class="actions">
        <select class="btn btn-sm btn-ghost" onchange="changeStatus(${o.id}, this.value)" style="padding:4px 8px;font-size:.68rem">
          <option value="">— status</option>
          <option value="pending">pending</option>
          <option value="shipped">shipped</option>
          <option value="delivered">delivered</option>
          <option value="cancelled">cancelled</option>
        </select>
        <button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})">del</button>
      </div>
    </td>
  </tr>`;
}

// ── CRUD helpers ─────────────────────────────────────
async function addOrder() {
  const customer = document.getElementById('inCustomer').value.trim();
  const product  = document.getElementById('inProduct').value.trim();
  if (!customer || !product) { showToast('⚠️ Fill in both fields'); return; }
  await fetch(`${API}/orders`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customer_name: customer, product_name: product })
  });
  document.getElementById('inCustomer').value = '';
  document.getElementById('inProduct').value  = '';
}

async function changeStatus(id, status) {
  if (!status) return;
  await fetch(`${API}/orders/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
}

async function deleteOrder(id) {
  await fetch(`${API}/orders/${id}`, { method: 'DELETE' });
}

// ── SSE connection ────────────────────────────────────
function connectSSE() {
  const badge = document.getElementById('connBadge');
  const dot   = document.getElementById('liveDot');
  const es    = new EventSource(`${API}/stream`);

  es.onopen = () => {
    badge.textContent = 'LIVE';
    badge.className   = 'conn-badge live';
  };

  es.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    if (evt.type === 'connected') return;          // initial handshake

    addFeedCard(evt);
    applyTableChange(evt);
    showToast(toastText(evt));
  };

  es.onerror = () => {
    badge.textContent = 'DISCONNECTED';
    badge.className   = 'conn-badge error';
    dot.style.background = 'var(--red)';
    setTimeout(connectSSE, 3000);                  // reconnect in 3 s
    es.close();
  };
}

// ── Apply incoming change directly to the table ──────
function applyTableChange(evt) {
  const tbody = document.getElementById('ordersBody');
  const existing = document.getElementById(`row-${evt.order_id}`);

  if (evt.operation === 'DELETE') {
    if (existing) {
      existing.className = 'flash-del';
      setTimeout(() => existing.remove(), 800);
    }
    return;
  }

  const newRow = document.createElement('tr');
  newRow.id = `row-${evt.order_id}`;
  newRow.innerHTML = rowHTML({
    id:            evt.order_id,
    customer_name: evt.customer_name,
    product_name:  evt.product_name,
    status:        evt.status,
    updated_at:    evt.changed_at,
  }).replace(/^<tr[^>]*>/, '').replace(/<\/tr>$/, '');

  if (evt.operation === 'INSERT') {
    newRow.className = 'flash-new';
    if (tbody.querySelector('td[colspan]')) tbody.innerHTML = '';
    tbody.prepend(newRow);
  } else {
    newRow.className = 'flash-upd';
    if (existing) existing.replaceWith(newRow);
    else loadOrders();
  }
}

// ── Feed card ─────────────────────────────────────────
function addFeedCard(evt) {
  const feed = document.getElementById('feed');
  const empty = feed.querySelector('.feed-empty');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = `event-card ev-${evt.operation}`;
  card.innerHTML = `
    <div class="event-op">${opLabel(evt.operation)}</div>
    <div class="event-name">${esc(evt.customer_name || '—')}</div>
    <div class="event-prod">${esc(evt.product_name || '—')} · <span class="status-badge s-${evt.status}" style="font-size:.58rem;padding:2px 7px">${evt.status || '—'}</span></div>
    <div class="event-time">${new Date(evt.changed_at).toLocaleTimeString()}</div>`;
  feed.prepend(card);

  // keep feed to 50 cards
  while (feed.children.length > 50) feed.lastChild.remove();
}

function clearFeed() {
  document.getElementById('feed').innerHTML =
    `<div class="feed-empty">Feed cleared.<br/>Listening for new events…</div>`;
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Helpers ───────────────────────────────────────────
function opLabel(op) {
  return { INSERT: '🟢 New Order', UPDATE: '🟡 Order Updated', DELETE: '🔴 Order Deleted' }[op] || op;
}
function toastText(evt) {
  if (evt.operation === 'INSERT') return `New order #${evt.order_id} — ${evt.customer_name}`;
  if (evt.operation === 'UPDATE') return `Order #${evt.order_id} → ${evt.status}`;
  if (evt.operation === 'DELETE') return `Order #${evt.order_id} deleted`;
  return '';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ──────────────────────────────────────────────
loadOrders();
connectSSE();
</script>
</body>
</html>
